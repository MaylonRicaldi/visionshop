<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 — VISION SHOP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --black: #0a0a0a;
      --white: #f5f2ee;
      --accent: #c8a97e;
      --accent-dark: #a8824d;
      --gray: #6b6b6b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--black);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.08em;
      margin-bottom: 2rem;
    }
    .logo span { color: var(--accent); }
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 8rem;
      line-height: 1;
      letter-spacing: 0.05em;
      color: var(--accent);
    }
    h2 {
      font-size: 1.2rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      margin-bottom: 1rem;
    }
    p {
      color: var(--gray);
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      margin-bottom: 2rem;
      max-width: 360px;
    }
    a {
      display: inline-block;
      background: var(--accent);
      color: var(--black);
      text-decoration: none;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.15em;
      padding: 0.9rem 2rem;
      transition: background 0.25s ease;
      border: none;
    }
    a:hover { background: var(--accent-dark); color: var(--white); }
    .deco {
      position: fixed;
      right: -120px;
      top: -120px;
      width: 400px;
      height: 400px;
      border: 80px solid rgba(200, 169, 126, 0.05);
      border-radius: 50%;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="deco"></div>
  <div class="logo">VISION<span>SHOP</span></div>
  <h1>404</h1>
  <h2>PÁGINA NO ENCONTRADA</h2>
  <p>La página que buscas no existe o fue movida. Explora nuestro catálogo y encuentra tu estilo.</p>
  <a href="index.html">VOLVER AL INICIO</a>
</body>
</html>
